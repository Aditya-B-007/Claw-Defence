version: '3.8'

services:
  clawdefence:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - UPSTREAM_URL=https://api.openai.com/v1/chat/completions
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY}
    volumes:
      - ./config/policy.yaml:/app/config/policy.yaml